<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Generic NexumAir app icon: the brand slate squircle + a neutral 2x2 "apps"
       glyph. Used as the automatic fallback for any Frappe app we adopt that has
       no hand-made icon yet, so new apps always render on-brand (never raw
       Frappe colors). Upgrade an app to a custom glyph by adding it to APP_LOGOS. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5562"/>
      <stop offset="0.55" stop-color="#557E94"/>
      <stop offset="1" stop-color="#9DBEC8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#g)"/>
  <g fill="#ffffff">
    <rect x="28" y="28" width="18" height="18" rx="4"/>
    <rect x="54" y="28" width="18" height="18" rx="4"/>
    <rect x="28" y="54" width="18" height="18" rx="4"/>
    <rect x="54" y="54" width="18" height="18" rx="4"/>
  </g>
</svg>
